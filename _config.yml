title: SmartMoneyDaily
description: "Plain-English guides to high-yield savings accounts, CDs, and money market accounts."
url: "https://kkumakkuma.github.io"
baseurl: "/SmartMoneyDaily"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: Kkuma Park
  email: "kkumaspark@gmail.com"

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-5L40K3SBQT"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock
