title: SmartMoneyDaily
description: "Plain-English guides to high-yield savings accounts, CDs, and money market accounts."
url: "https://kkumakkuma.github.io"
baseurl: "/SmartMoneyDaily"
permalink: /:year/:month/:day/:title/
future: true

theme: minima

author:
  name: SmartMoneyDaily
  email: ""

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

google_analytics: "G-5L40K3SBQT"

exclude:
  - scripts/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock

# Social / Pinterest
social:
  name: SmartTemplates
  links:
    - https://pinterest.com/smarttemplates
