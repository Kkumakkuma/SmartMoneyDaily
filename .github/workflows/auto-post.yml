name: Auto Generate Blog Post

on:
  schedule:
    # v8.2 (2026-06-04): 저녁 시간대(KST 18~22시) 랜덤 발행.
    # 아래 5개 슬롯이 매일 모두 트리거되지만, gate step 이 그 중 2개를 확률적으로
    # 선택해 실제 발행한다(하루 정확히 2편). "매일 같은 시각 발행" 패턴 제거 목적.
    - cron: '11 9 * * *'   # ~KST 18:11
    - cron: '23 10 * * *'  # ~KST 19:23
    - cron: '42 11 * * *'  # ~KST 20:42
    - cron: '17 12 * * *'  # ~KST 21:17
    - cron: '50 12 * * *'  # ~KST 21:50
  workflow_dispatch: # Allow manual trigger
    inputs:
      count:
        description: 'number of posts to generate in one run'
        required: false
        default: '1'

permissions:
  contents: write
  pages: write
  id-token: write

# 동시 실행 직렬화 — 슬롯 경합으로 인한 push 충돌/리베이스 깨짐 방지 (2026-05-30)
concurrency:
  group: auto-post-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    outputs:
      post: ${{ steps.gate.outputs.post }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate — pick one random evening slot per day
        id: gate
        run: |
          # 수동 트리거(workflow_dispatch)는 항상 발행
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "manual/dispatch run — post"
            echo "post=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 하루 발행 목표 편수. 오늘(KST) 이미 채웠으면 skip — 하루 정확히 N편 보장.
          DAILY_TARGET=2
          TODAY_KST="$(TZ=Asia/Seoul date +%Y-%m-%d)"
          published=$(git log --since="${TODAY_KST}T00:00:00+09:00" --pretty=%s | grep -c '^Auto-publish new' || true)
          need=$(( DAILY_TARGET - published ))
          if [ "$need" -le 0 ]; then
            echo "already published $published today (KST $TODAY_KST, target $DAILY_TARGET) — skip"
            echo "post=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 슬롯 균등 확률: 남은 슬롯에 '남은 발행 수(need)'를 균등 분산.
          # 현재 슬롯 당첨 확률 = need/remaining. 남은 슬롯이 need 이하로 줄면 강제 발행.
          # → 하루 DAILY_TARGET 편이 5개 슬롯에 균등하게 흩어짐.
          SLOTS=("11 9 * * *" "23 10 * * *" "42 11 * * *" "17 12 * * *" "50 12 * * *")
          THIS="${{ github.event.schedule }}"
          idx=-1
          for i in "${!SLOTS[@]}"; do [ "${SLOTS[$i]}" = "$THIS" ] && idx=$i; done
          if [ "$idx" -lt 0 ]; then
            echo "unrecognized slot ($THIS) — post to be safe"
            echo "post=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          remaining=$(( ${#SLOTS[@]} - idx ))
          if [ "$(( RANDOM % remaining ))" -lt "$need" ]; then
            echo "slot #$idx chosen (need $need / remaining $remaining, published $published) — post"
            echo "post=true" >> "$GITHUB_OUTPUT"
          else
            echo "slot #$idx skipped (need $need / remaining $remaining, published $published) — wait for a later slot"
            echo "post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.post == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Random delay (0-1800s) — extra jitter within the slot
        if: steps.gate.outputs.post == 'true' && github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Sleeping ${DELAY}s before generation"
          sleep $DELAY

      - name: Install dependencies
        if: steps.gate.outputs.post == 'true'
        run: pip install openai Pillow

      - name: Generate new post (with retry on transient failures)
        if: steps.gate.outputs.post == 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 28
          max_attempts: 3
          retry_wait_seconds: 60
          command: python scripts/generate_post.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          POST_COUNT: ${{ github.event.inputs.count || '1' }}

      - name: Commit new post
        if: steps.gate.outputs.post == 'true'
        run: |
          git config user.name "SmartMoneyDaily Bot"
          git config user.email "bot@smartmoneydaily.com"
          git add _posts/ scripts/used_topics.json scripts/used_promo_titles.json assets/pin-images/
          if git diff --staged --quiet; then
            echo "no staged changes"
            exit 0
          fi
          git commit -m "Auto-publish new article $(date +%Y-%m-%d-%H%M)"
          for i in 1 2 3 4 5; do
            if git push; then echo pushed; exit 0; fi
            echo "push attempt $i failed; aborting half-done rebase and re-syncing"
            git rebase --abort 2>/dev/null || true
            git pull --rebase -X ours origin main || { git rebase --abort 2>/dev/null || true; sleep $((RANDOM % 10 + 3)); }
          done
          echo "push failed after retries"; exit 1

      - name: Setup Ruby
        if: steps.gate.outputs.post == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        if: steps.gate.outputs.post == 'true'
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        if: steps.gate.outputs.post == 'true'
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        if: steps.gate.outputs.post == 'true'
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: generate-post
    if: needs.generate-post.outputs.post == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for IndexNow
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: IndexNow ping (Bing/Yandex/Naver)
        if: success()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, os, subprocess, urllib.request, re
          repo = os.environ.get("GITHUB_REPOSITORY","").split("/")[-1]
          if not repo:
              raise SystemExit(0)
          since_iso = subprocess.check_output(
              ["bash","-c","date -u -d '1 hour ago' +'%Y-%m-%dT%H:%M:%SZ'"]
          ).decode().strip()
          out = subprocess.check_output(
              ["git","log","--since",since_iso,"--name-only","--pretty=format:","--diff-filter=A"]
          ).decode()
          urls = []
          for line in out.split("\n"):
              m = re.match(r"_posts/(\d{4})-(\d{2})-(\d{2})-(.+)\.md$", line.strip())
              if m:
                  yyyy, mm, dd, slug = m.groups()
                  urls.append(f"https://kkumakkuma.github.io/{repo}/{yyyy}/{mm}/{dd}/{slug}/")
          if not urls:
              print("IndexNow: no new URLs in last hour")
              raise SystemExit(0)
          payload = {
              "host": "kkumakkuma.github.io",
              "key": "3edb9ac60100921ec4665d794fb30755",
              "keyLocation": "https://kkumakkuma.github.io/3edb9ac60100921ec4665d794fb30755.txt",
              "urlList": urls,
          }
          req = urllib.request.Request(
              "https://api.indexnow.org/IndexNow",
              data=json.dumps(payload).encode(),
              headers={"Content-Type":"application/json"},
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              print(f"IndexNow OK: {resp.status} ({len(urls)} URLs)")
          except Exception as e:
              print(f"IndexNow fail (non-fatal): {e}")
          PY

      - name: Pinterest auto-pin (new posts)
        if: success()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, os, subprocess, urllib.request, urllib.parse, urllib.error, base64, re
          repo = os.environ.get("GITHUB_REPOSITORY","").split("/")[-1]
          if not repo:
              raise SystemExit(0)
          since_iso = subprocess.check_output(
              ["bash","-c","date -u -d '1 hour ago' +'%Y-%m-%dT%H:%M:%SZ'"]
          ).decode().strip()
          out = subprocess.check_output(
              ["git","log","--since",since_iso,"--name-only","--pretty=format:","--diff-filter=A"]
          ).decode()
          new_posts = []
          for line in out.split("\n"):
              line = line.strip()
              if line.startswith("_posts/") and line.endswith(".md"):
                  new_posts.append(line)
          if not new_posts:
              print("Pinterest: no new posts in last hour")
              raise SystemExit(0)
          print(f"Pinterest: found {len(new_posts)} new post(s)")

          # refresh_token으로 access_token 즉시 갱신
          refresh = os.environ["PINTEREST_REFRESH_TOKEN"]
          app_id = os.environ["PINTEREST_APP_ID"]
          app_secret = os.environ["PINTEREST_APP_SECRET"]
          board_id = os.environ["PINTEREST_BOARD_ID"]
          creds = base64.b64encode(f"{app_id}:{app_secret}".encode()).decode()
          body = urllib.parse.urlencode({
              "grant_type": "refresh_token",
              "refresh_token": refresh,
          }).encode()
          token_req = urllib.request.Request(
              "https://api.pinterest.com/v5/oauth/token",
              data=body,
              headers={
                  "Authorization": f"Basic {creds}",
                  "Content-Type": "application/x-www-form-urlencoded",
              },
              method="POST",
          )
          try:
              token_resp = urllib.request.urlopen(token_req, timeout=20)
              tokens = json.loads(token_resp.read())
              access = tokens["access_token"]
              print(f"Pinterest: access_token refreshed (expires_in {tokens.get(\"expires_in\")}s)")
          except urllib.error.HTTPError as e:
              print(f"Pinterest token refresh FAIL HTTP {e.code}: {e.read().decode()[:300]}")
              raise SystemExit(0)

          # 각 새 글 마다 핀 업로드
          for post_path in new_posts:
              m = re.match(r"_posts/(\d{4})-(\d{2})-(\d{2})-(.+)\.md$", post_path)
              if not m:
                  continue
              yyyy, mm, dd, slug = m.groups()
              page_url = f"https://kkumakkuma.github.io/{repo}/{yyyy}/{mm}/{dd}/{slug}/"
              pin_image = f"https://kkumakkuma.github.io/{repo}/assets/pin-images/{yyyy}-{mm}-{dd}-{slug}.png"
              try:
                  with open(post_path, encoding="utf-8") as f:
                      content = f.read()
              except Exception as e:
                  print(f"  read {post_path} fail: {e}")
                  continue
              fm = re.search(r"---\n(.*?)\n---", content, re.DOTALL)
              if fm:
                  title_m = re.search(r'title:\s*"(.+?)"', fm.group(1))
                  desc_m = re.search(r'description:\s*"(.+?)"', fm.group(1))
                  title = title_m.group(1) if title_m else slug.replace("-"," ").title()
                  description = desc_m.group(1) if desc_m else ""
              else:
                  title, description = slug.replace("-"," ").title(), ""
              pin_body = {
                  "board_id": board_id,
                  "title": title[:100],
                  "description": description[:500],
                  "link": page_url,
                  "media_source": {
                      "source_type": "image_url",
                      "url": pin_image,
                  },
              }
              pin_req = urllib.request.Request(
                  "https://api.pinterest.com/v5/pins",
                  data=json.dumps(pin_body).encode(),
                  headers={
                      "Authorization": f"Bearer {access}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              try:
                  pin_resp = urllib.request.urlopen(pin_req, timeout=30)
                  pin_data = json.loads(pin_resp.read())
                  print(f"  Pin OK: id={pin_data.get('id')} title={title[:60]}")
              except urllib.error.HTTPError as e:
                  print(f"  Pin FAIL ({title[:30]}): HTTP {e.code} {e.read().decode()[:300]}")
              except Exception as e:
                  print(f"  Pin FAIL ({title[:30]}): {e}")
          PY
        env:
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
