---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <p class="post-meta">Published on {{ page.date | date: "%B %d, %Y" }} {% if page.categories %} | {{ page.categories | join: ", " }}{% endif %}</p>

  <div class="ad-slot">Ad Space - Google AdSense</div>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="ad-slot">Ad Space - Google AdSense</div>
</article>
